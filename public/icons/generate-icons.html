<!DOCTYPE html>
<html>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
// Open this file in a browser, right-click the canvas to save as PNG
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const g = ctx.createLinearGradient(0, 0, 512, 512);
g.addColorStop(0, '#E94088');
g.addColorStop(1, '#8B5CF6');

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

roundRect(ctx, 0, 0, 512, 512, 100);
ctx.fillStyle = g;
ctx.fill();

// Draw heart
ctx.save();
ctx.translate(256, 230);
ctx.scale(3.5, 3.5);
ctx.beginPath();
ctx.moveTo(0, 30);
ctx.bezierCurveTo(-40, -10, -40, -40, 0, -20);
ctx.bezierCurveTo(40, -40, 40, -10, 0, 30);
ctx.fillStyle = 'white';
ctx.fill();
ctx.restore();

// Draw house outline
ctx.strokeStyle = 'rgba(255,255,255,0.6)';
ctx.lineWidth = 6;
ctx.beginPath();
ctx.moveTo(160, 340);
ctx.lineTo(160, 420);
ctx.lineTo(352, 420);
ctx.lineTo(352, 340);
ctx.stroke();

// Roof
ctx.beginPath();
ctx.moveTo(140, 345);
ctx.lineTo(256, 280);
ctx.lineTo(372, 345);
ctx.stroke();

document.title = 'Right-click canvas -> Save as icon-512.png';
</script>
</body>
</html>
